services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time public vars (baked into bundle)
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    image: digital-store:latest
    container_name: digital-store
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Runtime secrets (server-side only, never exposed to browser)
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      FLOUCI_PUBLIC_KEY: ${FLOUCI_PUBLIC_KEY}
      FLOUCI_PRIVATE_KEY: ${FLOUCI_PRIVATE_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
